version: 0.0
os: linux

files:
  - source: api-blsheet
    destination: /home/ec2-user/app

  - source: scripts
    destination: /home/ec2-user/scripts

hooks:
   BeforeInstall:
    - location: scripts/install.sh    # ← your existing file
      timeout: 60
      runas: root
  AfterInstall:
    - location: scripts/install.sh    # ← handles npm install
      timeout: 300
      runas: ec2-user
  ApplicationStart:
    - location: scripts/start.sh      # ← your existing file
      timeout: 60
      runas: ec2-user
  ValidateService:
    - location: scripts/validate_service.sh   # ← add this new file
      timeout: 60
      runas: root
