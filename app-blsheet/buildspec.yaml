version: 0.2

env:
  variables:
    FRONTEND_BUCKET: "blsheet-frontend-bucket-12345678"

phases:

  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "=== Installing frontend dependencies ==="
      - cd app-blsheet && npm ci --prefer-offline

  pre_build:
    commands:
      - echo "=== Setting up environment ==="
      - cd app-blsheet
      - |
        ALB_DNS=$(aws ssm get-parameter \
          --name /blsheet/ALB_DNS \
          --query Parameter.Value \
          --output text \
          --region $AWS_DEFAULT_REGION 2>/dev/null || echo "")
        if [ -n "$ALB_DNS" ]; then
          echo "VITE_BASE_URL=http://${ALB_DNS}/api/v1" > .env.production
        else
          echo "WARNING: /blsheet/ALB_DNS not found in SSM. VITE_BASE_URL will be empty."
        fi
      - cat .env.production

  build:
    commands:
      - echo "=== Building React/Vite frontend ==="
      - cd app-blsheet && npm run build
      - ls -la app-blsheet/dist/
      - echo "Frontend build completed at $(date)"

  post_build:
    commands:
      - echo "=== Syncing to S3 ==="
      - |
        aws s3 sync app-blsheet/dist/ s3://${FRONTEND_BUCKET}/ \
          --delete \
          --region $AWS_DEFAULT_REGION
      - |
        aws s3 cp s3://${FRONTEND_BUCKET}/index.html \
          s3://${FRONTEND_BUCKET}/index.html \
          --metadata-directive REPLACE \
          --content-type "text/html" \
          --cache-control "no-cache, no-store, must-revalidate" \
          --region $AWS_DEFAULT_REGION
      - echo "Frontend deployed to s3://${FRONTEND_BUCKET}"

artifacts:
  base-directory: app-blsheet/dist
  files:
    - "**/*"

cache:
  paths:
    - app-blsheet/node_modules/**/*